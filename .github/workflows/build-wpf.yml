name: Build WPF App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-wpf-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish WPF app
        shell: pwsh
        run: ./publish-wpf.ps1

      - name: Upload WPF artifact
        uses: actions/upload-artifact@v4
        with:
          name: MovieReporter-wpf
          path: MovieReporter.exe
          if-no-files-found: error

      - name: Ensure GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        id: release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { owner, repo } = context.repo;
            const releaseTitle = tag;

            try {
              await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              try {
                await github.rest.repos.createRelease({
                  owner,
                  repo,
                  tag_name: tag,
                  name: releaseTitle,
                  draft: false,
                  prerelease: tag.includes('-'),
                  generate_release_notes: true,
                });
              } catch (createError) {
                if (createError.status !== 422) {
                  throw createError;
                }
              }
            }

            core.setOutput('tag', tag);

      - name: Upload WPF release asset
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: gh release upload $env:RELEASE_TAG MovieReporter.exe --clobber
