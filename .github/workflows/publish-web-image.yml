name: Publish Web Image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: publish-web-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image name
        id: prep
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "image=ghcr.io/${owner}/movie-reporter-web" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.image }}
          tags: |
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: MovieReporter.Web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Ensure GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/github-script@v7
        env:
          IMAGE_NAME: ${{ steps.prep.outputs.image }}
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { owner, repo } = context.repo;
            const imageName = process.env.IMAGE_NAME;
            const releaseTitle = tag;
            const containerNote =
              "## Container Image\n\n" +
              "- `" + imageName + ":" + tag + "`\n" +
              "- `" + imageName + ":latest`";

            let release;
            try {
              release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              try {
                release = await github.rest.repos.createRelease({
                  owner,
                  repo,
                  tag_name: tag,
                  name: releaseTitle,
                  draft: false,
                  prerelease: tag.includes('-'),
                  generate_release_notes: true,
                });
              } catch (createError) {
                if (createError.status !== 422) {
                  throw createError;
                }

                release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              }
            }

            const body = release.data.body ?? "";
            if (!body.includes(containerNote)) {
              const mergedBody = body ? body + "\n\n" + containerNote : containerNote;
              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: release.data.id,
                tag_name: tag,
                name: releaseTitle,
                body: mergedBody,
                draft: false,
                prerelease: tag.includes('-'),
              });
            }
